<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin • Exist Worldwide</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <div class="header-left">
      <h1 class="glitch" data-text="Exist Worldwide">Exist Worldwide</h1>
      <p class="tagline">Elevate your Existance</p>
    </div>

    <div class="header-right">
      <button class="cart-btn" id="logoutBtn" style="padding: 12px 16px; display:none;">Logout</button>
      <a class="cart-btn" href="/" style="padding: 12px 16px;">Store</a>
    </div>
  </header>

  <main class="admin">
    <section id="loginSection" class="admin-panel">
      <h2>Admin login</h2>
      <form id="loginForm">
        <div class="form-row">
          <label for="username">Username</label>
          <input id="username" name="username" required />
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required />
        </div>
        <div class="form-actions">
          <button type="submit">Sign in</button>
        </div>
        <div id="loginMessage" class="form-message" role="alert"></div>
      </form>
    </section>

    <section id="adminSection" class="admin" hidden>
      <section class="admin-panel">
        <h2>New Product</h2>
        <form id="productForm">
          <div class="form-row">
            <label for="name">Name</label>
            <input id="name" name="name" required />
          </div>

          <div class="form-row">
            <label for="price">Price (PHP)</label>
            <input id="price" name="price" type="number" step="0.01" min="0" required />
          </div>

          <div class="form-row">
            <label for="cost">Cost (PHP)</label>
            <input id="cost" name="cost" type="number" step="0.01" min="0" />
            <p class="hint">Use this to calculate profit/loss in the admin dashboard (optional).</p>
          </div>

          <div class="form-row">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="" disabled selected>Select category</option>
              <option value="Boxers">Boxers</option>
              <option value="Earrings">Earrings</option>
              <option value="Necklace">Necklace</option>
              <option value="Watch">Watch</option>
              <option value="Perfume">Perfume</option>
              <option value="Vape">Vape</option>
              <option value="Earrings Bundle">Earrings Bundle</option>
              <option value="Tank Tops">Tank Tops</option>
            </select>
          </div>

          <div class="form-row">
            <label for="images">Image <span class="optional">(required for new products)</span></label>
            <input id="images" name="images" type="file" accept="image/*" required />
            <p class="hint" id="imagesHint">Upload exactly 1 image.</p>
          </div>

          <div class="form-actions">
            <button type="submit" id="submitProductBtn">Add Product</button>
            <button type="button" id="cancelEditBtn" class="secondary" hidden>Cancel</button>
          </div>

          <div id="formMessage" class="form-message" role="alert"></div>
        </form>
      </section>

      <section class="admin-panel">
        <h2>Hot Products</h2>
        <div id="hotProducts" class="hot-products"></div>
      </section>

      <section class="admin-panel">
        <h2>Business Calculator</h2>
        <div class="calculator">
          <div class="form-row">
            <label for="shippingCost">Shipping cost (PHP)</label>
            <input id="shippingCost" type="number" step="0.01" min="0" value="0" />
          </div>
          <div class="calc-results" id="calcResults"></div>
        </div>
      </section>

      <section class="admin-panel">
        <h2>Overview</h2>
        <canvas id="overviewChart" width="200" height="200"></canvas>
        <div id="chartLegend" class="chart-legend"></div>
      </section>

      <section class="admin-list">
        <h2>Products</h2>
        <div id="products" class="product-table"></div>
      </section>
    </section>
  </main>

  <script src="admin.js?v=2"></script>
</body>

</html>
